<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>鎶栭煶鐩存挱闂寸洃鎺?/title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#ff4757">
<link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>馃帴</text></svg>">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #121212; color: #e0e0e0; min-height: 100vh; }

.app-header { background: #1a1a2e; padding: 16px 20px; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 12px; }
.app-header h1 { font-size: 18px; color: #ff4757; font-weight: 700; }
.live-dot { width: 10px; height: 10px; background: #ff4757; border-radius: 50%; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

.status-bar { background: #1e1e2e; padding: 10px 20px; font-size: 12px; color: #888; display: flex; justify-content: space-between; align-items: center; }
.status-bar .monitoring { color: #2ed573; }

.add-section { padding: 16px 20px; border-bottom: 1px solid #2a2a3a; }
.add-section h3 { font-size: 14px; color: #aaa; margin-bottom: 10px; }
.input-row { display: flex; gap: 10px; }
.input-row input { flex: 1; background: #1e1e2e; border: 1px solid #333; color: #e0e0e0; padding: 12px 14px; border-radius: 10px; font-size: 14px; outline: none; }
.input-row input:focus { border-color: #ff4757; }
.input-row button { background: #ff4757; color: #fff; border: none; padding: 12px 20px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; }
.input-row button:active { opacity: 0.85; }
.input-row button:disabled { background: #555; cursor: not-allowed; }

.room-list { padding: 0 20px; }
.room-card { background: #1e1e2e; border-radius: 12px; margin: 12px 0; padding: 16px; border: 1px solid #2a2a3a; }
.room-card.live { border-color: #ff4757; box-shadow: 0 0 12px rgba(255,71,87,0.15); }
.room-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.room-nickname { font-size: 15px; font-weight: 600; color: #fff; }
.room-badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.room-badge.offline { background: #2a2a3a; color: #666; }
.room-badge.live { background: #ff4757; color: #fff; animation: pulse 1s infinite; }
.room-meta { font-size: 12px; color: #555; margin-bottom: 10px; }
.room-url { font-size: 11px; color: #444; word-break: break-all; }
.room-actions { margin-top: 10px; display: flex; gap: 8px; }
.room-actions button { padding: 6px 14px; border-radius: 6px; font-size: 12px; border: none; cursor: pointer; }
.room-actions .btn-check { background: #2a2a3a; color: #aaa; }
.room-actions .btn-delete { background: #ff4757; color: #fff; }

.empty-state { text-align: center; padding: 60px 20px; color: #444; }
.empty-state p { font-size: 14px; }

.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #2ed573; color: #fff; padding: 12px 24px; border-radius: 10px; font-size: 14px; font-weight: 600; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
.toast.show { opacity: 1; }
.toast.error { background: #ff4757; }

.last-check { font-size: 11px; color: #444; text-align: center; padding: 6px; }

.alert-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,71,87,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
.alert-overlay.show { opacity: 1; pointer-events: all; }
.alert-overlay h2 { font-size: 28px; color: #fff; margin-bottom: 10px; }
.alert-overlay p { font-size: 16px; color: rgba(255,255,255,0.8); }
.alert-overlay button { margin-top: 30px; background: #fff; color: #ff4757; border: none; padding: 14px 30px; border-radius: 30px; font-size: 15px; font-weight: 700; cursor: pointer; }
</style>
</head>
<body>

<header class="app-header">
  <div class="live-dot"></div>
  <h1>鎶栭煶鐩存挱闂寸洃鎺?/h1>
  <button onclick="openSettings()" style="margin-left:auto;background:none;border:none;color:#888;font-size:18px;cursor:pointer;">鈿欙笍</button>
</header>

<div id="settingsModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);z-index:2000;align-items:center;justify-content:center;">
  <div style="background:#1e1e2e;border-radius:16px;padding:24px;width:90%;max-width:400px;border:1px solid #333;">
    <h3 style="color:#fff;margin-bottom:16px;">鈿欙笍 鏈嶅姟鍣ㄨ缃?/h3>
    <p style="color:#666;font-size:12px;margin-bottom:10px;">濉啓杩愯 server.js 鐨勭數鑴?IP 鍦板潃鍜岀鍙?/p>
    <input type="text" id="serverUrlInput" placeholder="http://192.168.1.10:3456" style="width:100%;background:#121212;border:1px solid #333;color:#e0e0e0;padding:12px;border-radius:8px;font-size:14px;margin-bottom:12px;box-sizing:border-box;">
    <div style="display:flex;gap:10px;">
      <button onclick="saveSettings()" style="flex:1;background:#ff4757;color:#fff;border:none;padding:12px;border-radius:8px;font-size:14px;cursor:pointer;">淇濆瓨</button>
      <button onclick="document.getElementById('settingsModal').style.display='none'" style="flex:1;background:#333;color:#aaa;border:none;padding:12px;border-radius:8px;font-size:14px;cursor:pointer;">鍙栨秷</button>
    </div>
  </div>
</div>

<div class="status-bar" id="statusBar">
  <span id="monitorStatus">鈴?鏈湪鐩戞帶鏃舵 (11:00-00:00)</span>
  <span id="nextCheck">鈥?/span>
</div>

<div class="add-section">
  <h3>娣诲姞鐩存挱闂?/h3>
  <div class="input-row">
    <input type="text" id="roomInput" placeholder="绮樿创鎶栭煶鐩存挱闂撮摼鎺ユ垨 room_id" />
    <button id="addBtn" onclick="addRoom()">娣诲姞</button>
  </div>
</div>

<div class="room-list" id="roomList">
  <div class="empty-state" id="emptyState">
    <p>鏆傛棤鐩戞帶鐨勬埧闂?/p>
    <p style="margin-top:8px;font-size:12px;">娣诲姞鐩存挱闂村悗寮€濮嬬洃鎺?/p>
  </div>
</div>

<div class="last-check" id="lastCheck"></div>

<!-- 寮€鎾彁閱掑脊绐?-->
<div class="alert-overlay" id="alertOverlay">
  <h2 id="alertTitle">寮€鎾簡锛?/h2>
  <p id="alertSubtitle"></p>
  <button onclick="dismissAlert()">鎴戠煡閬撲簡</button>
</div>

<div class="toast" id="toast"></div>

<script>
// Server URL: default to Capacitor config, allow override via localStorage
const DEFAULT_API = 'http://192.168.1.10:3456';
const API = localStorage.getItem('douyin_api_url') || DEFAULT_API;

let rooms = [];
let monitorTimer = null;
let notifiedLive = new Set(); // 宸叉彁閱掕繃鐨勭洿鎾棿

function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show' + (isError ? ' error' : '');
  setTimeout(() => t.className = 'toast', 2500);
}

function speak(text) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-CN';
  u.rate = 1.1;
  window.speechSynthesis.speak(u);
}

function showAlert(nickname) {
  document.getElementById('alertTitle').textContent = nickname + ' 寮€鎾簡锛?;
  document.getElementById('alertSubtitle').textContent = '蹇幓鐪嬬洿鎾瓇';
  document.getElementById('alertOverlay').classList.add('show');
  speak(nickname + ' 寮€鎾簡');
}

function dismissAlert() {
  document.getElementById('alertOverlay').classList.remove('show');
}

// 鍒ゆ柇褰撳墠鏄惁鍦ㄧ洃鎺ф椂娈?11:00-00:00
function isInMonitorWindow() {
  const now = new Date();
  const h = now.getHours();
  return h >= 11 && h < 24;
}

function updateMonitorStatus() {
  const el = document.getElementById('monitorStatus');
  if (isInMonitorWindow()) {
    el.textContent = '鉁?姝ｅ湪鐩戞帶 (11:00-00:00) 姣?鍒嗛挓妫€鏌?;
    el.className = 'monitoring';
  } else {
    el.textContent = '鈴?鏈湪鐩戞帶鏃舵 (11:00-00:00)';
  }
}

async function loadRooms() {
  try {
    const res = await fetch(`${API}/api/rooms`);
    rooms = await res.json();
    renderRooms();
  } catch (e) {
    showToast('鏃犳硶杩炴帴鏈嶅姟鍣?, true);
  }
}

async function addRoom() {
  const input = document.getElementById('roomInput');
  const btn = document.getElementById('addBtn');
  const identifier = input.value.trim();
  if (!identifier) return showToast('璇疯緭鍏ョ洿鎾棿閾炬帴', true);

  btn.disabled = true;
  btn.textContent = '娣诲姞涓€?;
  try {
    const res = await fetch(`${API}/api/rooms`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ identifier })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || '娣诲姞澶辫触');
    rooms.push(data);
    renderRooms();
    input.value = '';
    showToast(`宸叉坊鍔? ${data.nickname}`);
  } catch (e) {
    showToast(e.message, true);
  } finally {
    btn.disabled = false;
    btn.textContent = '娣诲姞';
  }
}

async function deleteRoom(id) {
  try {
    await fetch(`${API}/api/rooms/${id}`, { method: 'DELETE' });
    rooms = rooms.filter(r => r.id !== id);
    notifiedLive.delete(id);
    renderRooms();
    showToast('宸插垹闄?);
  } catch (e) {
    showToast('鍒犻櫎澶辫触', true);
  }
}

async function checkRoom(room) {
  try {
    const res = await fetch(`${API}/api/rooms/check`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ identifier: room.identifier })
    });
    const data = await res.json();
    return data;
  } catch {
    return { isLive: false, nickname: room.nickname };
  }
}

async function checkAllRooms() {
  if (!isInMonitorWindow()) {
    updateMonitorStatus();
    return;
  }

  document.getElementById('lastCheck').textContent = '姝ｅ湪妫€鏌モ€?;
  const results = await Promise.all(rooms.map(r => checkRoom(r)));

  let anyLive = false;
  results.forEach((info, i) => {
    rooms[i].isLive = info.isLive;
    rooms[i].nickname = info.nickname || rooms[i].nickname;
    rooms[i].roomTitle = info.roomTitle || '';

    if (info.isLive && !notifiedLive.has(rooms[i].id)) {
      notifiedLive.add(rooms[i].id);
      anyLive = true;
      showAlert(info.nickname);
    }
    if (!info.isLive) {
      notifiedLive.delete(rooms[i].id);
    }
  });

  renderRooms();
  const now = new Date();
  document.getElementById('lastCheck').textContent =
    `涓婃妫€鏌? ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
}

function renderRooms() {
  const list = document.getElementById('roomList');
  const empty = document.getElementById('emptyState');

  if (rooms.length === 0) {
    empty.style.display = '';
    list.querySelectorAll('.room-card').forEach(c => c.remove());
    return;
  }
  empty.style.display = 'none';

  // 澶嶇敤宸叉湁鍗＄墖
  const existingIds = new Set();
  list.querySelectorAll('.room-card').forEach(c => {
    existingIds.add(c.dataset.id);
  });

  rooms.forEach(room => {
    let card = list.querySelector(`.room-card[data-id="${room.id}"]`);
    if (!card) {
      card = document.createElement('div');
      card.className = 'room-card';
      card.dataset.id = room.id;
      list.appendChild(card);
    }
    card.className = 'room-card' + (room.isLive ? ' live' : '');
    card.innerHTML = `
      <div class="room-card-header">
        <span class="room-nickname">${room.nickname || '鏈煡涓绘挱'}</span>
        <span class="room-badge ${room.isLive ? 'live' : 'offline'}">
          ${room.isLive ? '馃敶 鐩存挱涓? : '鈼?鏈紑鎾?}
        </span>
      </div>
      <div class="room-meta">${room.roomTitle || ''}</div>
      <div class="room-url">${room.identifier}</div>
      <div class="room-actions">
        <button class="btn-check" onclick="manualCheck('${room.id}')">馃攧 妫€鏌?/button>
        <button class="btn-delete" onclick="deleteRoom('${room.id}')">馃棏 鍒犻櫎</button>
      </div>
    `;
  });
}

async function manualCheck(id) {
  const room = rooms.find(r => r.id === id);
  if (!room) return;
  const info = await checkRoom(room);
  room.isLive = info.isLive;
  room.nickname = info.nickname || room.nickname;
  renderRooms();
  if (info.isLive) showToast('褰撳墠姝ｅ湪鐩存挱锛?);
  else showToast('褰撳墠鏈紑鎾?);
}

// 鍚姩瀹氭椂鐩戞帶
function startMonitor() {
  // 姣?鍒嗛挓妫€鏌ヤ竴娆?  monitorTimer = setInterval(() => {
    checkAllRooms();
  }, 5 * 60 * 1000);

  // 姣忓垎閽熸洿鏂扮姸鎬佹樉绀?  setInterval(updateMonitorStatus, 60000);

  // 绔嬪嵆鎵ц涓€娆?  checkAllRooms();
}

// 鎵撳紑璁剧疆
function openSettings() {
  const modal = document.getElementById('settingsModal');
  document.getElementById('serverUrlInput').value = localStorage.getItem('douyin_api_url') || DEFAULT_API;
  modal.style.display = 'flex';
}

// 淇濆瓨璁剧疆
function saveSettings() {
  const url = document.getElementById('serverUrlInput').value.trim();
  if (url) {
    localStorage.setItem('douyin_api_url', url);
    showToast('璁剧疆宸蹭繚瀛橈紝璇峰埛鏂伴〉闈?);
  }
  document.getElementById('settingsModal').style.display = 'none';
}

// PWA Service Worker 娉ㄥ唽
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').then(() => {
    console.log('SW registered');
  }).catch(e => console.log('SW register failed:', e));
}

// 椤甸潰鍔犺浇
loadRooms().then(() => {
  updateMonitorStatus();
  startMonitor();
});
</script>
</body>
</html>
